# Cloudflare Pages configuration.
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# Dashboard settings (one-time, per-project setup):
#   Root directory:  apps/web
#   Build command:   bash ../../scripts/cf-pages-build.sh
#
# [build] is intentionally absent — it's Workers-only and switches
# Pages CI into Workers deploy mode. Pages build command comes from
# the dashboard; build logic lives in scripts/cf-pages-build.sh.

name = "astar-scan"
compatibility_date = "2025-07-15"
pages_build_output_dir = ".output/public"
