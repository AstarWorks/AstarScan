name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel older in-flight production deploys when a new commit lands on main.
concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pages:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # Reads project name, compatibility date, and build output dir from
      # wrangler.toml. No CLI flags needed — all deploy configuration is
      # declarative and lives in version control alongside the code.
      - name: Deploy to Cloudflare Pages
        run: bunx wrangler@4 pages deploy
