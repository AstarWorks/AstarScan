name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel older in-flight production deploys when a new commit lands on main.
concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pages:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # Idempotent: if the project already exists, the create fails and we
      # fall through to the deploy step, which is the happy path after the
      # very first run. The `|| true` only masks the "already exists" error;
      # a true auth / quota failure will re-surface in the deploy step.
      - name: Ensure Cloudflare Pages project exists
        run: |
          bunx wrangler@4 pages project create astar-scan --production-branch=main \
            || echo "Project may already exist — continuing to deploy step"

      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler@4 pages deploy apps/web/.output/public \
            --project-name=astar-scan \
            --branch=main
