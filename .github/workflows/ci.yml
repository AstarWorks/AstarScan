name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Build + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # bun.lock is intentionally gitignored (Astar convention), so we
      # install without --frozen-lockfile. Version drift is accepted as
      # a tradeoff for consistency with sibling repos.
      - name: Install dependencies
        run: bun install

      - name: Build + typecheck (bun run ci)
        run: bun run ci
