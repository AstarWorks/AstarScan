# Cloudflare Pages configuration (config-as-code).
# Reference: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# AstarScan is a pure static SPA — no server component, no Workers script.
# Deployment is handled by Cloudflare Pages' GitHub integration: Cloudflare
# detects pushes to main, reads this file, runs the build command, and
# publishes `pages_build_output_dir`. No GitHub Actions deploy workflow.

name = "astar-scan"
compatibility_date = "2025-07-15"
pages_build_output_dir = "apps/web/.output/public"

[build]
command = "bash scripts/download-ocr-models.sh && bash scripts/download-siglip-model.sh && bun run build"
