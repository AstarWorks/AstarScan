# Cloudflare Pages configuration (config-as-code).
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# AstarScan is a pure static SPA — no Workers, no server component.
# Deployment: Cloudflare Pages GitHub integration (native).
#
# Monorepo compatibility:
# - "." in package.json workspaces → bypasses workspace root detection
# - [build] cwd = "apps/web" → scopes framework detection to Nuxt only
#   (without this, autoconfig finds Vite×3 + Nuxt and fails)

name = "astar-scan"
compatibility_date = "2025-07-15"
pages_build_output_dir = "apps/web/.output/public"

[build]
command = "bash ../../scripts/cf-pages-build.sh"
cwd = "apps/web"
